<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cortex — Private Business Operating System</title>
<meta name="description" content="Cortex is a private business operating system. Access is by invitation only."/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A1410'/%3E%3Ctext x='32' y='44' font-family='Georgia, %27Cormorant Garamond%27, serif' font-size='38' font-weight='700' fill='%23B8841A' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #1A1410;
    color: #F7F3EE;
    font-family: 'DM Sans', sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap {
    max-width: 480px;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.16,1,.3,1) 0.15s forwards;
  }
  .logo {
    position: relative;
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: 0.14em;
    margin-bottom: 24px;
    background: linear-gradient(
      100deg,
      #8a6322 0%,
      #8a6322 38%,
      #f0d49c 48%,
      #fff6e0 50%,
      #f0d49c 52%,
      #8a6322 62%,
      #8a6322 100%
    );
    background-size: 260% 100%;
    background-position: 100% 0;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: sweep 4.5s ease-in-out 1.1s infinite;
  }
  .logo em {
    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    color: #F7F3EE;
    font-style: normal;
  }
  p {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(247,243,238,0.65);
    font-weight: 300;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes sweep {
    0%   { background-position: 130% 0; }
    45%  { background-position: -30% 0; }
    100% { background-position: -30% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .wrap { opacity: 1; animation: none; }
    .logo { animation: none; background-position: 0 0; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">CORTEX<em>.</em></div>
    <p>Private Business Operating System. By invitation only.<br/>If you have been sent here directly, please use the link provided to you.</p>
  </div>
</body>
</html>
